<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐷 小猪求职看板 - 王老虎</title>
  <style>
    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --primary: #e8927c;
      --primary-light: #fbe9e3;
      --primary-bg: #fff5f2;
      --text: #3d3d3d;
      --text-light: #888;
      --border: #eee;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-left h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .header-left .pig { font-size: 28px; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-light);
    }

    /* Search Area */
    .search-area {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .field-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .field-tab {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
      color: var(--text-light);
      font-weight: 500;
      user-select: none;
    }
    .field-tab:hover { border-color: var(--primary); color: var(--primary); }
    .field-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-row input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: white;
      transition: 0.2s;
    }
    .search-row input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .search-row .count { font-size: 14px; color: var(--text-light); white-space: nowrap; }
    .field-hint {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .field-hint .hint-tag {
      background: #f5f5f5;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* Table */
    .table-wrap {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .job-table { width: 100%; border-collapse: collapse; }
    .job-table th {
      background: var(--primary);
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 12px 10px;
      text-align: left;
      white-space: nowrap;
    }
    .job-table td {
      padding: 12px 10px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }
    .job-table tr:last-child td { border-bottom: none; }
    .job-table tr:hover td { background: var(--primary-bg); }
    .job-table tr.hidden { display: none; }

    .col-date { min-width: 75px; }

    /* 除摘要列外，其他列不换行 */
    .job-table td { white-space: nowrap; }
    .job-table td:nth-child(5) { white-space: normal; word-break: break-word; }

    .company-name { font-weight: 700; color: var(--primary); font-size: 14px; }
    .position-name { font-weight: 600; font-size: 14px; }
    .city-name { font-size: 13px; color: var(--text-light); }
    .date-text { font-size: 12px; color: var(--text-light); white-space: nowrap; }
    .summary-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    .summary-text .match-note {
      display: block; margin-top: 4px; padding: 5px 10px;
      background: #fff8e8; border-radius: 6px; font-size: 12px;
      line-height: 1.4; border-left: 3px solid #f0c966;
    }
    .summary-text .match-note::before { content: "🐷 "; }
    a.job-link { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }
    a.job-link:hover { text-decoration: underline; }

    /* Status selector */
    .status-select {
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      width: 100%;
      max-width: 90px;
    }
    .status-select:focus { outline: none; border-color: var(--primary); }
    .status-select.default { color: #bbb; }
    .status-select.interested { color: #1565c0; font-weight: 600; background: #e3f2fd; }
    .status-select.applied { color: #2e7d32; font-weight: 600; background: #e8f5e9; }
    .status-select.rejected { color: #c62828; font-weight: 600; background: #fce4ec; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      padding: 16px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 12px; }
      .job-table, .job-table thead, .job-table tbody,
      .job-table tr, .job-table td, .job-table th { display: block; }
      .job-table thead { display: none; }
      .job-table td {
        padding: 8px 12px;
        border-bottom: none;
        position: relative;
        padding-left: 95px;
      }
      .job-table td::before {
        position: absolute; left: 12px;
        font-weight: 600; color: var(--text-light); font-size: 12px;
      }
      .job-table td:nth-of-type(1)::before { content: "收录日期"; }
      .job-table td:nth-of-type(2)::before { content: "公司"; }
      .job-table td:nth-of-type(3)::before { content: "职位"; }
      .job-table td:nth-of-type(4)::before { content: "城市"; }
      .job-table td:nth-of-type(5)::before { content: "摘要"; }
      .job-table td:nth-of-type(6)::before { content: "链接"; }
      .job-table td:nth-of-type(7)::before { content: "状态"; }
      .job-table tr {
        margin-bottom: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .status-select { max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="pig">🐷</span>
      <h1>小猪求职看板 · 老虎</h1>
    </div>
    <div class="header-right">
      <span>已收录 <strong id="totalJobs">0</strong> 个岗位</span>
      <span>更新：<strong id="lastUpdate">2026-05-23</strong></span>
    </div>
  </div>

  <!-- Search Area -->
  <div class="search-area">
    <div class="field-tabs" id="fieldTabs">
      <span class="field-tab active" data-field="all" onclick="setField('all')">🔍 全部字段</span>
      <span class="field-tab" data-field="company" onclick="setField('company')">🏢 公司</span>
      <span class="field-tab" data-field="position" onclick="setField('position')">💼 职位</span>
      <span class="field-tab" data-field="city" onclick="setField('city')">📍 城市</span>
      <span class="field-tab" data-field="summary" onclick="setField('summary')">📝 摘要</span>
      <span class="field-tab" data-field="date" onclick="setField('date')">📅 日期</span>
    </div>
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="输入关键词搜索..." autofocus>
      <span class="count" id="filterCount">显示 0 个</span>
    </div>
    <div class="field-hint">
      多个关键词用空格分隔 = 同时满足
      <span class="hint-tag" id="currentFieldHint">当前：全部字段</span>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="job-table">
      <thead>
        <tr>
          <th>收录日期</th>
          <th>公司</th>
          <th>职位</th>
          <th>城市</th>
          <th>职位摘要</th>
          <th>链接</th>
          <th>查阅状态</th>
        </tr>
      </thead>
      <tbody id="jobBody"></tbody>
    </table>
  </div>

  <div class="footer">
    🐷 小猪求职助手 · 点击状态下拉框即可编辑 · 重复岗位不覆盖 · 状态自动保存在浏览器
  </div>

  <script>
    let jobsData = [];
    let currentField = 'all';

    function setField(field) {
      currentField = field;
      document.querySelectorAll('.field-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.field === field);
      });
      const labels = {
        all: '全部字段', company: '公司', position: '职位',
        city: '城市', summary: '摘要', date: '日期'
      };
      document.getElementById('currentFieldHint').textContent = '当前：' + labels[field];
      renderJobs();
    }

    async function loadJobs() {
      try {
        const resp = await fetch('./jobs-data.json');
        jobsData = await resp.json();
        jobsData.sort((a, b) => b.id - a.id);
        loadSavedStatuses();
        renderJobs();
      } catch(e) {
        document.getElementById('jobBody').innerHTML =
          '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;">⏳ 数据加载中……</td></tr>';
      }
    }

    function getFieldText(job, field) {
      const map = {
        company: job.company || '',
        position: job.position || '',
        city: job.city || '',
        date: job.date || '',
        summary: (job.summary || '') + ' ' + (job.matchNote || '')
      };
      return map[field] || '';
    }

    function renderJobs() {
      const query = document.getElementById('searchInput').value.trim();
      const keywords = query ? query.toLowerCase().split(/\s+/) : [];

      const filtered = jobsData.filter(j => {
        if (!keywords.length) return true;

        if (currentField === 'all') {
          const allText = [
            j.company, j.position, j.city, j.date,
            j.summary, j.matchNote || '', j.source || ''
          ].join(' ').toLowerCase();
          return keywords.every(k => allText.includes(k));
        } else {
          const fieldText = getFieldText(j, currentField).toLowerCase();
          return keywords.every(k => fieldText.includes(k));
        }
      });

      const tbody = document.getElementById('jobBody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;font-size:14px;">😶 没有找到匹配的岗位</td></tr>';
        document.getElementById('filterCount').textContent = '显示 0 个';
        document.getElementById('totalJobs').textContent = jobsData.length;
        return;
      }

      tbody.innerHTML = filtered.map(j => {
        const sc = statusClass(j.status);
        return `<tr>
          <td><span class="date-text">${esc(j.date || '—')}</span></td>
          <td><span class="company-name">${esc(j.company)}</span></td>
          <td><span class="position-name">${esc(j.position)}</span></td>
          <td><span class="city-name">${esc(j.city)}</span></td>
          <td>
            <div class="summary-text">
              ${esc(j.summary)}
              ${j.matchNote ? `<span class="match-note">${esc(j.matchNote)}</span>` : ''}
            </div>
          </td>
          <td><a class="job-link" href="${escAttr(j.url)}" target="_blank">🔗 查看</a></td>
          <td>
            <select class="status-select ${sc}" onchange="updateStatus(${j.id}, this)">
              <option value="" ${j.status === '' ? 'selected' : ''}>—</option>
              <option value="感兴趣" ${j.status === '感兴趣' ? 'selected' : ''}>⭐ 感兴趣</option>
              <option value="已投递" ${j.status === '已投递' ? 'selected' : ''}>📮 已投递</option>
              <option value="已拒绝" ${j.status === '已拒绝' ? 'selected' : ''}>❌ 已拒绝</option>
            </select>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('totalJobs').textContent = jobsData.length;
      document.getElementById('filterCount').textContent = `显示 ${filtered.length} / ${jobsData.length} 个`;
    }

    function statusClass(status) {
      if (!status) return 'default';
      const map = { '感兴趣': 'interested', '已投递': 'applied', '已拒绝': 'rejected' };
      return map[status] || 'default';
    }

    function updateStatus(id, select) {
      const job = jobsData.find(j => j.id === id);
      if (!job) return;
      job.status = select.value;
      select.className = 'status-select ' + statusClass(job.status);
      saveStatuses();
    }

    function saveStatuses() {
      localStorage.setItem('tigerJobStatuses',
        JSON.stringify(jobsData.map(j => ({ id: j.id, status: j.status })))
      );
    }

    function loadSavedStatuses() {
      try {
        const saved = JSON.parse(localStorage.getItem('tigerJobStatuses'));
        if (saved) {
          saved.forEach(s => {
            const job = jobsData.find(j => j.id === s.id);
            if (job) job.status = s.status;
          });
        }
      } catch(e) {}
    }

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }
    function escAttr(text) {
      return text.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    let st;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(st);
      st = setTimeout(renderJobs, 120);
    });

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey) {
        const fields = ['all', 'company', 'position', 'city', 'summary', 'date'];
        const idx = parseInt(e.key);
        if (idx >= 1 && idx <= 6) {
          e.preventDefault();
          setField(fields[idx - 1]);
          document.getElementById('searchInput').focus();
        }
      }
    });

    loadJobs();
  </script>
</body>
</html>
