  <style>
    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --primary: #e8927c;
      --primary-light: #fbe9e3;
      --primary-bg: #fff5f2;
      --text: #3d3d3d;
      --text-light: #888;
      --border: #eee;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 2px solid var(--primary);
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-left h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .header-left .pig { font-size: 28px; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-light);
    }

    /* Search Area */
    .search-area {
      background: var(--card);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .field-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .field-tab {
      padding: 5px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
      color: var(--text-light);
      font-weight: 500;
      user-select: none;
    }
    .field-tab:hover { border-color: var(--primary); color: var(--primary); }
    .field-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-row input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: white;
      transition: 0.2s;
    }
    .search-row input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .search-row .count { font-size: 14px; color: var(--text-light); white-space: nowrap; }
    .field-hint {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .field-hint .hint-tag {
      background: #f5f5f5;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* Table */
    .table-wrap {
      background: var(--card);
      border-radius: 14px;
      overflow-x: auto;
      overflow-y: visible;
      box-shadow: var(--shadow);
    }
    .table-wrap::-webkit-scrollbar { height: 6px; }
    .table-wrap::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }
    .table-wrap::-webkit-scrollbar-track { background: #f0f0f0; }
    .job-table { width: 100%; border-collapse: collapse; }
    .job-table { min-width: 900px; }
    .job-table th {
      background: var(--primary);
      color: white;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
    }
    .job-table td {
      padding: 10px 8px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }
    .job-table th:nth-child(6), .job-table td:nth-child(6) { min-width: 240px; max-width: 360px; }
    .job-table tr:last-child td { border-bottom: none; }
    .job-table tr:hover td { background: var(--primary-bg); }
    .job-table tr.hidden { display: none; }

    .col-date { min-width: 75px; }

    /* 除摘要列(第6列)外，其他列不换行 */
    .job-table td:not(:nth-child(6)) { white-space: nowrap; }
    .job-table td:nth-child(6) { white-space: normal; word-break: break-word; }
    .job-table th:nth-child(1) { width: 75px; }
    .job-table th:nth-child(2) { min-width: 140px; max-width: 220px; }
    .job-table td:nth-child(2) { white-space: normal; word-break: break-word; }
    .job-table th:nth-child(3) { width: 150px; max-width: 190px; }
    .job-table td:nth-child(3) { white-space: normal; word-break: break-word; max-width: 190px; }
    .job-table th:nth-child(4) { width: 85px; }
    .job-table th:nth-child(5) { width: 55px; }
    .job-table th:nth-child(7) { width: 45px; }
    .job-table th:nth-child(8) { width: 80px; }

    .company-name { font-weight: 700; color: var(--primary); font-size: 14px; }
    .brief-text { font-size: 12px; color: var(--text-light); }
    .position-name { font-weight: 600; font-size: 14px; }
    .city-name { font-size: 13px; color: var(--text-light); }
    .salary-text { font-size: 13px; color: #e8927c; font-weight: 600; }
    .date-text { font-size: 12px; color: var(--text-light); white-space: nowrap; }
    .summary-text { font-size: 13px; color: var(--text); line-height: 1.6; }
    .summary-text .match-note {
      display: block; margin-top: 4px; padding: 5px 10px;
      background: #fff8e8; border-radius: 6px; font-size: 12px;
      line-height: 1.4; border-left: 3px solid #f0c966;
    }
    .summary-text .match-note::before { content: "🐷 "; }
    a.job-link { color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 600; }
    a.job-link:hover { text-decoration: underline; }

    /* Status selector */
    .status-select {
      padding: 5px 6px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      background: white;
      cursor: pointer;
      width: 100%;
      max-width: 90px;
    }
    .status-select:focus { outline: none; border-color: var(--primary); }
    .status-select.default { color: #bbb; }
    .status-select.interested { color: #1565c0; font-weight: 600; background: #e3f2fd; }
    .status-select.applied { color: #2e7d32; font-weight: 600; background: #e8f5e9; }
    .status-select.not-interested { color: #757575; font-weight: 600; background: #f5f5f5; }
    .status-select.rejected { color: #c62828; font-weight: 600; background: #fce4ec; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      padding: 16px;
    }

    /* Responsive - Tablet & Below */
    @media (max-width: 900px) {
      .table-wrap { overflow-x: auto; }
    }

    /* Responsive - Mobile */
    @media (max-width: 640px) {
      body { padding: 10px; }

      .header { padding: 10px 0; gap: 8px; }
      .header-left h1 { font-size: 18px; }
      .header-right { font-size: 12px; gap: 10px; }

      .search-area { padding: 12px 14px; }
      .search-row input { font-size: 14px; padding: 8px 12px; }
      .search-row .count { font-size: 13px; }
      .field-tab { font-size: 12px; padding: 4px 10px; }

      /* Reset table to block layout */
      .table-wrap {
        overflow: visible;
      }
      .job-table, .job-table thead, .job-table tbody,
      .job-table tr, .job-table td, .job-table th { display: block; }
      .job-table thead { display: none; }
      .job-table { min-width: unset; width: 100%; }

      .job-table tr {
        margin-bottom: 14px;
        border: 1px solid #e8e0db;
        border-radius: 12px;
        overflow: visible;
        background: white;
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        width: 100%;
      }

      .job-table td {
        padding: 7px 12px;
        border-bottom: 1px solid #f2edeb;
        position: relative;
        padding-left: 72px;
        font-size: 13px;
        white-space: normal !important;
        word-break: break-word;
        overflow: visible;
        height: auto;
        min-height: auto;
      }
      .job-table td:last-child { border-bottom: none; }

      .job-table td::before {
        position: absolute; left: 12px; top: 7px;
        font-weight: 600; color: #b0a5a0; font-size: 11px;
        letter-spacing: 0.5px;
      }
      .job-table td:nth-of-type(1)::before { content: "📅"; }
      .job-table td:nth-of-type(2)::before { content: "🏢"; }
      .job-table td:nth-of-type(3)::before { content: "💼"; }
      .job-table td:nth-of-type(4)::before { content: "📍"; }
      .job-table td:nth-of-type(5)::before { content: "💰"; }
      .job-table td:nth-of-type(6)::before { content: "📝"; }
      .job-table td:nth-of-type(7)::before { content: "🔗"; }
      .job-table td:nth-of-type(8)::before { content: "📌"; }

      .company-name { font-size: 15px; }
      .position-name { font-size: 14px; }
      .summary-text { font-size: 12px; }
      .summary-text .match-note {
        font-size: 11px;
        padding: 4px 8px;
      }

      .status-select {
        max-width: 100%;
        padding: 8px 10px;
        font-size: 13px;
      }

      a.job-link {
        display: inline-block;
        padding: 4px 0;
        font-size: 13px;
      }

      .footer { font-size: 11px; padding: 12px; }
    }

    /* Small phones */
    @media (max-width: 420px) {
      body { padding: 6px; }
      .header-left h1 { font-size: 16px; }
      .search-area { padding: 10px; }
      .field-tabs { gap: 4px; }
      .field-tab { font-size: 11px; padding: 3px 8px; }
      .job-table td { padding-left: 60px; font-size: 12px; }
      .job-table td::before { font-size: 10px; left: 8px; }
    }
  </style>
</head>

    let jobsData = [];
    let currentField = 'all';

    function setField(field) {
      currentField = field;
      document.querySelectorAll('.field-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.field === field);
      });
      const labels = {
        all: '全部字段', company: '公司', position: '职位',
        city: '城市', summary: '摘要', date: '日期'
      };
      document.getElementById('currentFieldHint').textContent = '当前：' + labels[field];
      renderJobs();
    }

    function loadJobs() {
      jobsData = JOBS_DATA;
      jobsData.sort((a, b) => b.id - a.id);
      loadSavedStatuses();
      renderJobs();
    }

    function getFieldText(job, field) {
      const map = {
        company: job.company || '',
        position: job.position || '',
        city: job.city || '',
        date: job.date || '',
        summary: (job.summary || '') + ' ' + (job.matchNote || '')
      };
      return map[field] || '';
    }

    function renderJobs() {
      const query = document.getElementById('searchInput').value.trim();
      const keywords = query ? query.toLowerCase().split(/\s+/) : [];

      const filtered = jobsData.filter(j => {
        if (!keywords.length) return true;

        if (currentField === 'all') {
          const allText = [
            j.company, j.position, j.city, j.date,
            j.summary, j.matchNote || '', j.source || ''
          ].join(' ').toLowerCase();
          return keywords.every(k => allText.includes(k));
        } else {
          const fieldText = getFieldText(j, currentField).toLowerCase();
          return keywords.every(k => fieldText.includes(k));
        }
      });

      const tbody = document.getElementById('jobBody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;font-size:14px;">😶 没有找到匹配的岗位</td></tr>';
        document.getElementById('filterCount').textContent = '显示 0 个';
        document.getElementById('totalJobs').textContent = jobsData.length;
        return;
      }

      tbody.innerHTML = filtered.map(j => {
        const sc = statusClass(j.status);
        return `<tr>
          <td><span class="date-text">${esc(j.date || '—')}</span></td>
          <td><span class="company-name">${esc(j.company)}</span>${j.brief ? `<br><span class="brief-text">${esc(j.brief)}</span>` : ''}</td>
          <td><span class="position-name">${esc(j.position)}</span></td>
          <td><span class="city-name">${esc(j.city)}</span></td>
          <td><span class="salary-text">${j.salary ? esc(j.salary) : '—'}</span></td>
          <td>
            <div class="summary-text">
              ${esc(j.summary)}
              ${j.matchNote ? `<span class="match-note">${esc(j.matchNote)}</span>` : ''}
            </div>
          </td>
          <td><a class="job-link" href="${escAttr(j.url)}" target="_blank">🔗 查看</a></td>
          <td>
            <select class="status-select ${sc}" onchange="updateStatus(${j.id}, this)">
              <option value="" ${j.status === '' ? 'selected' : ''}>—</option>
              <option value="感兴趣" ${j.status === '感兴趣' ? 'selected' : ''}>⭐ 感兴趣</option>
              <option value="已投递" ${j.status === '已投递' ? 'selected' : ''}>➡️ 已投递</option>
              <option value="不感兴趣" ${j.status === '不感兴趣' ? 'selected' : ''}>🙅 不感兴趣</option>
              <option value="已拒绝" ${j.status === '已拒绝' ? 'selected' : ''}>❌ 已拒绝</option>
            </select>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('totalJobs').textContent = jobsData.length;
      document.getElementById('filterCount').textContent = `显示 ${filtered.length} / ${jobsData.length} 个`;
    }

    function statusClass(status) {
      if (!status) return 'default';
      const map = { '感兴趣': 'interested', '已投递': 'applied', '不感兴趣': 'not-interested', '已拒绝': 'rejected' };
      return map[status] || 'default';
    }

    function updateStatus(id, select) {
      const job = jobsData.find(j => j.id === id);
      if (!job) return;
      job.status = select.value;
      select.className = 'status-select ' + statusClass(job.status);
      saveStatuses();
    }

    let syncTimer = null;
    const SYNC_OWNER = 'Tigerwang17';
    const SYNC_REPO = 'pigjob';
    const SYNC_BRANCH = 'main';
    const SYNC_PATH = 'status-sync.json';

    function saveStatuses() {
      const data = jobsData.map(j => ({ id: j.id, status: j.status }));
      localStorage.setItem('tigerJobStatuses', JSON.stringify(data));
      // Auto-sync to GitHub (debounced 3s)
      clearTimeout(syncTimer);
      syncTimer = setTimeout(() => syncToGitHub(data), 3000);
    }

    function getGitHubToken() {
      return localStorage.getItem('tigerGithubToken') || '';
    }

    function showSyncMsg(msg, ok) {
      const el = document.getElementById('syncMsg');
      if (!el) return;
      el.textContent = msg;
      el.style.color = ok ? '#2e7d32' : '#c62828';
      el.style.opacity = '1';
      clearTimeout(el._hide);
      el._hide = setTimeout(() => { el.style.opacity = '0'; }, 4000);
    }

    async function syncToGitHub(data) {
      const token = getGitHubToken();
      if (!token) return; // No token configured, skip sync

      try {
        // First get the current file SHA (if exists)
        let sha = null;
        try {
          const getRes = await fetch(`https://api.github.com/repos/${SYNC_OWNER}/${SYNC_REPO}/contents/${SYNC_PATH}`, {
            headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
          });
          if (getRes.ok) {
            const existing = await getRes.json();
            sha = existing.sha;
          }
        } catch(e) { /* File might not exist yet */ }

        const content = btoa(unescape(encodeURIComponent(JSON.stringify({ statuses: data, updated: new Date().toISOString() }, null, 2))));

        const putRes = await fetch(`https://api.github.com/repos/${SYNC_OWNER}/${SYNC_REPO}/contents/${SYNC_PATH}`, {
          method: 'PUT',
          headers: {
            'Authorization': 'token ' + token,
            'Content-Type': 'application/json',
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            message: '🐷 同步状态 ' + new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Hong_Kong' }),
            content: content,
            sha: sha || undefined,
            branch: SYNC_BRANCH
          })
        });

        if (putRes.ok) {
          showSyncMsg('✅ 状态已同步到云端', true);
        } else {
          const err = await putRes.json();
          showSyncMsg('❌ 同步失败: ' + (err.message || '未知错误'), false);
        }
      } catch(e) {
        showSyncMsg('❌ 同步异常: ' + e.message, false);
      }
    }

    function setupToken() {
      const existing = getGitHubToken();
      const token = prompt(existing ? '更新GitHub Token (留空不变):' : '请输入GitHub Personal Access Token (用于同步状态到云端):');
      if (token === null) return;
      if (token.trim()) {
        localStorage.setItem('tigerGithubToken', token.trim());
        showSyncMsg('✅ Token已保存，下次改状态会自动同步', true);
        // Trigger a sync now
        const data = jobsData.map(j => ({ id: j.id, status: j.status }));
        syncToGitHub(data);
      }
    }

    function loadSavedStatuses() {
      try {
        const saved = JSON.parse(localStorage.getItem('tigerJobStatuses'));
        if (saved) {
          saved.forEach(s => {
            const job = jobsData.find(j => j.id === s.id);
            if (job) job.status = s.status;
          });
        }
      } catch(e) {}
    }

    function esc(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }
    function escAttr(text) {
      return text.replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    let st;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(st);
      st = setTimeout(renderJobs, 120);
    });

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey) {
        const fields = ['all', 'company', 'position', 'city', 'summary', 'date'];
        const idx = parseInt(e.key);
        if (idx >= 1 && idx <= 6) {
          e.preventDefault();
          setField(fields[idx - 1]);
          document.getElementById('searchInput').focus();
        }
      }
    });

    loadJobs();
  </script>
</body>
</html>
